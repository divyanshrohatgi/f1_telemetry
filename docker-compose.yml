version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1-telemetry-api
    ports:
      - "8000:8000"
    volumes:
      # Persist FastF1 cache across container restarts
      - f1_cache:/app/cache
      # Persist trained ML models
      - ml_models:/app/ml/saved_models
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: f1-telemetry-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  f1_cache:
    driver: local
  ml_models:
    driver: local
